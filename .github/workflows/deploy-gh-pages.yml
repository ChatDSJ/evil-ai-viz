name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Convex types
        run: bunx convex codegen
        env:
          CONVEX_URL: https://incredible-raven-736.convex.cloud

      - name: Build
        run: bun run build
        env:
          VITE_CONVEX_URL: https://incredible-raven-736.convex.cloud

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: aiheadquarters.ai
